name: Docker

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard stable publish from main only
        id: stable_guard
        shell: bash
        run: |
          git fetch origin main --force

          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "on_main=false" >> "$GITHUB_OUTPUT"
          echo "Tag commit is not reachable from origin/main. Stable Docker publish skipped."

      - name: Set up QEMU
        if: steps.stable_guard.outputs.on_main == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.stable_guard.outputs.on_main == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.stable_guard.outputs.on_main == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve app version
        if: steps.stable_guard.outputs.on_main == 'true'
        id: app_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        if: steps.stable_guard.outputs.on_main == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/feedarr
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=ref,event=tag,pattern={{version}},strip=v

      - name: Build & push
        if: steps.stable_guard.outputs.on_main == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEEDARR_VERSION=${{ steps.app_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: steps.stable_guard.outputs.on_main == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag
