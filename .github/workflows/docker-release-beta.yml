name: Docker (beta)

on:
  push:
    branches: ["beta"]

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          chmod +x ./.github/scripts/set-app-version.sh

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve app version (beta from git tag)
        id: app_version
        shell: bash
        run: |
          SHA7="${GITHUB_SHA::7}"

          git fetch origin main --force
          git fetch --tags --force

          # dernier tag stable present sur main uniquement
          LAST_TAG="$(git tag --merged origin/main -l 'v*' --sort=-v:refname | head -n 1)"

          if [[ -z "$LAST_TAG" ]]; then
            echo "No v* tag found. Fallback to 0.0.0" >&2
            BASE_VERSION="0.0.0"
          else
            BASE_VERSION="${LAST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          PATCH="$((PATCH + 1))"
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "version=${NEXT_VERSION}-beta-sha.${SHA7}" >> "$GITHUB_OUTPUT"
          echo "source_version=${NEXT_VERSION}-beta" >> "$GITHUB_OUTPUT"
          echo "docker_tag=beta-${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Sync source version for beta
        shell: bash
        run: |
          bash ./.github/scripts/set-app-version.sh "${{ steps.app_version.outputs.source_version }}"

          if git diff --quiet -- src/Feedarr.Api/Feedarr.Api.csproj; then
            echo "Beta source version already up to date."
            exit 0
          fi

          git add src/Feedarr.Api/Feedarr.Api.csproj
          git commit -m "chore: sync beta app version ${{ steps.app_version.outputs.source_version }} [skip ci]"
          git push origin HEAD:beta

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/feedarr
          tags: |
            type=raw,value=beta
            type=raw,value=${{ steps.app_version.outputs.docker_tag }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEEDARR_VERSION=${{ steps.app_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
