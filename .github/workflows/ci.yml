name: CI

on:
  pull_request:
    branches: [ main, beta ]
  push:
    branches: [ main, beta ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Feedarr.Web/feedarr-web/package-lock.json

      - name: Restore backend dependencies
        run: dotnet restore Feedarr.sln

      - name: Check backend vulnerable packages
        run: |
          dotnet list Feedarr.sln package --vulnerable --include-transitive --format json > dotnet-vuln.json || true
          node <<'NODE'
          const fs = require("fs");
          const raw = fs.readFileSync("dotnet-vuln.json", "utf8").trim();
          let report;
          try {
            report = JSON.parse(raw);
          } catch (e) {
            console.error("Failed to parse vulnerability report:", e.message);
            console.error("Raw output:", raw.slice(0, 500));
            process.exit(1);
          }
          const hits = [];
          for (const project of report.projects || []) {
            for (const framework of project.frameworks || []) {
              for (const pkg of [...(framework.topLevelPackages || []), ...(framework.transitivePackages || [])]) {
                if ((pkg.vulnerabilities || []).length) {
                  hits.push(`${project.path} [${framework.framework}] ${pkg.id}@${pkg.resolvedVersion}`);
                }
              }
            }
          }
          if (hits.length) {
            console.error("NuGet vulnerabilities detected:\n" + hits.join("\n"));
            process.exit(1);
          }
          console.log("No NuGet vulnerabilities detected.");
          NODE

      - name: Run backend tests
        run: dotnet test src/Feedarr.Api.Tests/Feedarr.Api.Tests.csproj -c Release

      - name: Install frontend dependencies
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm ci

      - name: Check frontend vulnerabilities
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm audit --audit-level=high

      - name: Run frontend lint
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm run lint -- --max-warnings=0

      - name: Run frontend tests
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm run test

      - name: Run categories domain guard
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm run check:categories-domain

      - name: Run frontend build
        working-directory: src/Feedarr.Web/feedarr-web
        run: npm run build

      - name: Packaging smoke test (Dockerfile)
        run: docker build -f docker/Dockerfile -t feedarr:ci .
